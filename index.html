<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Dolce Vita - Custom Bracelet</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --link-w: 60px;
            --link-h: 52px;
            --link-d: 10px; 
            --steel-surface: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 15%, #dbdbdb 50%, #c2c2c2 85%, #a8a8a8 100%);
            --steel-dark: #7a7a7a;
            --bg-color: #fdfcfb;
            --accent: #9b8a78;
            --vintage-tray-bg: #f4eccf; 
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color); color: #1a1a1a;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 40px 0; overflow-x: hidden; user-select: none;
        }

        .header-container { text-align: center; margin-bottom: 30px; padding: 0 15px; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 3.2rem; margin: 0; color: #111; font-style: italic; }
        h3 { font-weight: 300; font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-top: 5px; }

        .toolbar {
            background: white; padding: 15px 35px; border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #efefef;
            display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px;
            flex-wrap: wrap; /* Added for tablet responsiveness */
            max-width: 90%;
            box-sizing: border-box;
        }
        .price-wrap { display: flex; flex-direction: column; min-width: 130px; }
        .price-display { font-weight: 700; color: #111; font-size: 1.1rem; }
        .discount-badge { font-size: 0.6rem; color: #d9534f; font-weight: bold; text-transform: uppercase; display: none; }

        .range-wrap { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .link-counter { background: #f0ede9; color: #555; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; min-width: 70px; text-align: center; border: 1px solid #e0ddd8; }
        input[type=range] { accent-color: #111; cursor: pointer; width: 140px; }

        .btn { background: #111; color: #fff; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; letter-spacing: 1.5px; transition: 0.3s; font-size: 0.7rem; text-transform: uppercase; box-sizing: border-box; text-align: center; }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }

        .builder-viewport { width: 100%; background: #eeebe6; padding: 80px 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; overflow-x: auto; margin-bottom: 40px; display: flex; justify-content: center; }
        #bracelet { display: inline-flex; padding: 0 50px; align-items: flex-start; height: calc(var(--link-h) + 120px); }
        
        .slot {
            width: var(--link-w); height: var(--link-h); background: var(--steel-surface);
            position: relative; flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center;
            cursor: pointer; border-radius: 3px; margin-right: 2px;
            border-right: 1px solid rgba(0,0,0,0.3);
            box-shadow: inset 1px 1px 2px rgba(255,255,255, 0.9), inset -2px -2px 5px rgba(0,0,0, 0.2), 0 3px 6px rgba(0,0,0,0.1);
        }

        /* MOTIF BEHAVIOR: Square and Clipped */
        .slot[data-type="motif"] { overflow: hidden; }
        .slot[data-type="motif"] img { width: 100%; height: 100%; object-fit: cover; }

        /* PENDANT BEHAVIOR: Hanging and Visible */
        .slot[data-type="pendant"] { overflow: visible; z-index: 10; }
        .slot[data-type="pendant"] img { width: 100%; height: auto; position: relative; z-index: 11; }

        .slot img { pointer-events: none; }
        
        .slot::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-150%) skewX(-25deg); z-index: 5; pointer-events: none;
        }
        .slot:hover::before { animation: glint 0.8s ease-out; }
        @keyframes glint { 0% { transform: translateX(-150%) skewX(-25deg); } 100% { transform: translateX(150%) skewX(-25deg); } }

        .library-card { width: 95%; max-width: 900px; background: white; border-radius: 15px; box-shadow: 0 25px 60px rgba(0,0,0,0.07); overflow: hidden; border: 1px solid #f0f0f0; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #f0f0f0; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { flex: 0 0 auto; padding: 18px 25px; border: none; background: none; cursor: pointer; font-weight: 600; color: #bbb; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; }
        .tab-btn.active { color: #111; border-bottom: 3px solid #111; }
        
        .charms-grid { display: none; padding: 30px; gap: 12px; flex-wrap: wrap; justify-content: center; background: #fafafa; max-height: 300px; overflow-y: auto;}
        .charms-grid.active { display: flex; }
        .charm-item { 
            width: 54px; height: 44px; background: var(--steel-surface); box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: flex; align-items: center; justify-content: center; cursor: grab; border-radius: 3px; border: 1px solid #ddd; flex-shrink: 0; overflow: hidden; position: relative;
        }
        .charm-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .charm-price-tag { position: absolute; bottom: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 8px; padding: 1px 3px; border-top-left-radius: 3px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 25, 20, 0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #tray-view { background-color: var(--vintage-tray-bg); padding: 80px 40px; overflow-x: auto; max-width: 90%; border-radius: 12px; text-align: center; border: 4px solid #d4c5a3; box-shadow: 0 20px 60px rgba(0,0,0,0.5); box-sizing: border-box; }
        #scene-3d { width: 100%; height: 600px; perspective: 1500px; display: none; align-items: center; justify-content: center; cursor: grab; background: radial-gradient(circle at center, #5a4a3a 0%, #1e1812 100%); overflow: hidden; }
        .ring-container { transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        .ring { position: relative; transform-style: preserve-3d; transform: rotateX(-30deg) rotateY(0deg); transition: transform 0.15s ease-out; }
        .block-3d { position: absolute; transform-style: preserve-3d; width: var(--link-w); height: var(--link-h); left: calc(var(--link-w) / -2); top: calc(var(--link-h) / -2); }
        .face { position: absolute; width: 100%; height: 100%; display: flex; align-items: flex-start; justify-content: center; backface-visibility: visible; border: 1px solid rgba(0,0,0,0.2); }
        
        /* 3D specific motif vs pendant */
        .block-3d[data-type="motif"] .f-front { overflow: hidden; }
        .block-3d[data-type="motif"] .f-front img { width: 100%; height: 100%; object-fit: cover; }
        .block-3d[data-type="pendant"] .f-front { overflow: visible; }
        .block-3d[data-type="pendant"] .f-front img { width: 100%; height: auto; }

        .f-front  { transform: translateZ(calc(var(--link-d) / 2)); box-shadow: inset 1px 1px 2px rgba(255,255,255, 0.8), inset -2px -2px 5px rgba(0,0,0, 0.25); background: var(--steel-surface); }
        .f-back, .f-right, .f-left, .f-top, .f-bottom { background: var(--steel-dark); }
        .f-right  { width: var(--link-d); left: calc(var(--link-w) - (var(--link-d) / 2)); transform: rotateY(90deg); }
        .f-left   { width: var(--link-d); left: calc(var(--link-d) / -2); transform: rotateY(-90deg); }
        
        .modal-controls { margin-top: 40px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 95%; }

        /* --- RESPONSIVE LAYOUT QUERIES --- */
        @media (max-width: 800px) {
            .builder-viewport { justify-content: flex-start; } /* Allows smooth scrolling on tablet instead of locking center */
        }

        @media (max-width: 600px) { 
            :root { --link-w: 52px; --link-h: 46px; } 
            
            h1 { font-size: 2.4rem; }
            h3 { font-size: 0.75rem; }
            
            .toolbar { 
                flex-direction: column; 
                padding: 20px; 
                gap: 15px; 
                border-radius: 25px;
            }
            .price-wrap { align-items: center; text-align: center; }
            
            .builder-viewport { padding: 40px 0; }
            #bracelet { padding: 0 20px; }
            
            .charms-grid { padding: 20px 10px; }
            
            #tray-view { padding: 40px 20px; width: 95%; }
            #scene-3d { height: 450px; }
            
            .modal-controls { 
                flex-direction: column; 
                width: 100%; 
                padding: 0 20px; 
                box-sizing: border-box; 
                gap: 12px;
                margin-top: 20px;
            }
            .modal-controls .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>La Dolce Vita</h1>
        <h3>Customize your bracelet</h3>
    </div>

    <div class="toolbar">
        <div class="price-wrap">
            <div class="price-display" id="totalPrice">RM 8.00</div>
            <div class="discount-badge" id="discountBadge">BUNDLE APPLIED</div>
        </div>
        <div class="range-wrap">
            <input type="range" id="sizeRange" min="14" max="25" value="18">
            <div class="link-counter" id="linkCounter">18 LINKS</div>
        </div>
        <button class="btn" onclick="openPreview()">Preview</button>
    </div>

    <div class="builder-viewport">
        <div id="bracelet"></div>
    </div>

    <div class="library-card">
        <div class="tabs" id="tabContainer"></div>
        <div id="gridContainer"></div>
    </div>

    <div id="modal" class="modal">
        <div id="tray-view"><div id="capture-target" style="display: inline-flex; align-items: flex-start; height: calc(var(--link-h) + 120px);"></div></div>
        <div id="scene-3d">
            <div id="ring-container" class="ring-container">
                <div id="ring" class="ring"></div>
            </div>
        </div>
        <div class="modal-controls">
            <button class="btn" id="modeBtn" style="background:white; color:black;" onclick="toggleMode()">View in 3D</button>
            <button class="btn" style="background:var(--accent); color:#fff;" onclick="downloadFull()">Save Image</button>
            <button class="btn" style="background:#444; color: white;" onclick="closePreview()">Continue Editing</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
const seriesData = {
           Motifs: { 
              price: 3, 
              type: 'motif', 
              items: [
                // Page1
                "page1_img1.png", "page1_img2.png", "page1_img3.png", "page1_img4.png", "page1_img5.png",
                // Page3
                "page3_img1.png", "page3_img2.png", "page3_img3.png", "page3_img4.png", "page3_img5.png", "page3_img6.png", "page3_img7.png",
                // Page4
                "page4_img1.png", "page4_img2.png", "page4_img3.png", "page4_img4.png", "page4_img5.png", "page4_img6.png", "page4_img7.png", "page4_img8.png", "page4_img9.png",
                // Page5
                "page5_img1.png", "page5_img2.png", "page5_img3.png", "page5_img4.png", "page5_img5.png", "page5_img6.png", "page5_img7.png", "page5_img8.png", "page5_img9.png",
                // Page6
                "page6_img1.png", "page6_img2.png", "page6_img3.png", "page6_img4.png", "page6_img5.png", "page6_img6.png", "page6_img7.png", "page6_img8.png", "page6_img9.png",
                // Page7
                "page7_img1.png", "page7_img2.png", "page7_img3.png", "page7_img4.png", "page7_img5.png", "page7_img6.png", "page7_img7.png", "page7_img8.png", "page7_img9.png"
              ]
           },
           Pendants: { 
              price: 5, 
              type: 'pendant', 
              items: [
                // Page2
                "page2_img1.png", "page2_img2.png", "page2_img3.png", "page2_img4.png", "page2_img5.png"
              ]
           }
           };
        const BASE_PRICE = 8;
        const bracelet = document.getElementById('bracelet');
        const ring = document.getElementById('ring');
        const ringContainer = document.getElementById('ring-container');
        const linkCounter = document.getElementById('linkCounter');
        const priceDisplay = document.getElementById('totalPrice');
        const discountBadge = document.getElementById('discountBadge');
        
        let viewMode = 'tray';

        function init() {
            const tabs = document.getElementById('tabContainer');
            const grids = document.getElementById('gridContainer');
            
            Object.keys(seriesData).forEach((key, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${i===0?'active':''}`;
                btn.textContent = key;
                btn.onclick = (e) => switchTab(e, key);
                tabs.appendChild(btn);

                const grid = document.createElement('div');
                grid.id = `grid-${key}`;
                grid.className = `charms-grid ${i===0?'active':''}`;
                seriesData[key].items.forEach(imgUrl => {
                    const item = document.createElement('div');
                    item.className = 'charm-item';
                    item.innerHTML = `<img src="${imgUrl}"><div class="charm-price-tag">RM ${seriesData[key].price}</div>`;
                    item.draggable = true;
                    item.addEventListener('dragstart', e => { 
                        e.dataTransfer.setData('imgSrc', imgUrl); 
                        e.dataTransfer.setData('price', seriesData[key].price); 
                        e.dataTransfer.setData('type', seriesData[key].type); 
                    });
                    item.onclick = () => fillFirstEmpty(imgUrl, seriesData[key].price, seriesData[key].type);
                    grid.appendChild(item);
                });
                grids.appendChild(grid);
            });
            updateSize(18);
            setup3DControls();
            calculateTotal();
        }

        function switchTab(e, key) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.charms-grid').forEach(g => g.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(`grid-${key}`).classList.add('active');
        }

        function getOptimalCharmCost(m, p, memo = {}) {
            const key = `${m}-${p}`;
            if (memo[key] !== undefined) return memo[key];
            const bundles = [
                { m: 6, p: 2, cost: 18 }, { m: 7, p: 1, cost: 18 }, { m: 8, p: 0, cost: 18 },
                { m: 5, p: 1, cost: 12 }, { m: 5, p: 0, cost: 9 }
            ];
            let minCost = (m * 3) + (p * 5); 
            for (let b of bundles) {
                if (m >= b.m && p >= b.p) {
                    let costWithBundle = b.cost + getOptimalCharmCost(m - b.m, p - b.p, memo);
                    if (costWithBundle < minCost) minCost = costWithBundle;
                }
            }
            memo[key] = minCost;
            return minCost;
        }

        function calculateTotal() {
            let mCount = 0, pCount = 0;
            document.querySelectorAll('#bracelet .slot').forEach(slot => {
                const type = slot.getAttribute('data-type');
                if (type === 'motif') mCount++;
                if (type === 'pendant') pCount++;
            });
            const regularCost = (mCount * 3) + (pCount * 5);
            const optimalCost = getOptimalCharmCost(mCount, pCount);
            const finalTotal = BASE_PRICE + optimalCost;
            discountBadge.style.display = (optimalCost < regularCost) ? 'block' : 'none';
            priceDisplay.textContent = `RM ${finalTotal.toFixed(2)}`;
        }

        function fillFirstEmpty(src, price, type) {
            const empty = [...document.querySelectorAll('#bracelet .slot')].find(s => !s.querySelector('img'));
            if(empty) setSlotContent(empty, src, price, type);
        }

        function setSlotContent(slot, src, price, type) {
            slot.innerHTML = `<img src="${src}">`;
            slot.setAttribute('data-price', price);
            slot.setAttribute('data-type', type);
            calculateTotal();
        }

        function updateSize(n) {
            const cur = bracelet.children.length;
            linkCounter.textContent = `${n} LINKS`;
            if (cur < n) {
                for(let i=cur; i<n; i++) {
                    const s = document.createElement('div');
                    s.className = 'slot';
                    s.addEventListener('dragover', e => e.preventDefault());
                    s.addEventListener('drop', e => { 
                        e.preventDefault(); 
                        setSlotContent(s, e.dataTransfer.getData('imgSrc'), e.dataTransfer.getData('price'), e.dataTransfer.getData('type')); 
                    });
                    s.onclick = () => { 
                        s.innerHTML = ""; 
                        s.removeAttribute('data-price');
                        s.removeAttribute('data-type');
                        calculateTotal();
                    };
                    bracelet.appendChild(s);
                }
            } else {
                while(bracelet.children.length > n) bracelet.removeChild(bracelet.lastChild);
            }
            calculateTotal();
        }

        function openPreview() {
            document.getElementById('modal').style.display = 'flex';
            viewMode = 'tray';
            document.getElementById('tray-view').style.display = 'block';
            document.getElementById('scene-3d').style.display = 'none';
            document.getElementById('modeBtn').textContent = "VIEW IN 3D";
            renderTray();
        }

        function toggleMode() {
            const tray = document.getElementById('tray-view'), scene = document.getElementById('scene-3d'), btn = document.getElementById('modeBtn');
            if (viewMode === '3d') {
                viewMode = 'tray'; tray.style.display = 'block'; scene.style.display = 'none';
                btn.textContent = "VIEW IN 3D"; renderTray();
            } else {
                viewMode = '3d'; tray.style.display = 'none'; scene.style.display = 'flex';
                btn.textContent = "VIEW TRAY"; render3D();
            }
        }

        function renderTray() {
            const wrap = document.getElementById('capture-target');
            wrap.innerHTML = '';
            document.querySelectorAll('#bracelet .slot').forEach(s => {
                const c = s.cloneNode(true);
                c.style.cursor = "default";
                wrap.appendChild(c);
            });
        }

        function render3D() {
            ring.innerHTML = '';
            ringContainer.style.transform = `scale(1)`;
            ring.style.transform = `rotateX(-30deg) rotateY(0deg)`;
            const slots = document.querySelectorAll('#bracelet .slot');
            const count = slots.length;
            const linkW = window.innerWidth < 600 ? 52 : 60;
            const radius = Math.round((linkW / 2) / Math.tan(Math.PI / count)) + 1;

            slots.forEach((s, i) => {
                const img = s.querySelector('img');
                const type = s.getAttribute('data-type') || 'none';
                const angle = i * (360 / count);
                const block = document.createElement('div');
                block.className = 'block-3d';
                block.setAttribute('data-type', type);
                block.style.width = linkW + 'px';
                block.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
                
                const imgHtml = img ? `<img src="${img.src}">` : '';
                block.innerHTML = `
                    <div class="face f-front">${imgHtml}</div>
                    <div class="face f-back"></div>
                    <div class="face f-right"></div>
                    <div class="face f-left"></div>
                    <div class="face f-top" style="height:var(--link-d); top:calc(-var(--link-d)/2); transform:rotateX(90deg)"></div>
                    <div class="face f-bottom" style="height:var(--link-d); top:calc(var(--link-h) - var(--link-d)/2); transform:rotateX(-90deg)"></div>
                `;
                ring.appendChild(block);
            });
        }

        function downloadFull() {
            const target = viewMode === '3d' ? document.getElementById('scene-3d') : document.getElementById('tray-view');
            html2canvas(target, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'la-dolce-vita.png';
                a.click();
            });
        }

        function setup3DControls() {
            let isDown = false, sx, sy, rx = -30, ry = 0;
            const scene = document.getElementById('scene-3d');
            const start = (e) => { isDown = true; sx = e.pageX || (e.touches ? e.touches[0].pageX : 0); sy = e.pageY || (e.touches ? e.touches[0].pageY : 0); };
            const move = (e) => {
                if(!isDown) return;
                const x = e.pageX || (e.touches ? e.touches[0].pageX : 0), y = e.pageY || (e.touches ? e.touches[0].pageY : 0);
                ry += (x - sx) * 0.5; rx -= (y - sy) * 0.5;
                ring.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
                sx = x; sy = y;
            };
            const end = () => isDown = false;
            scene.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            scene.addEventListener('touchstart', start);
            window.addEventListener('touchmove', move, {passive:false});
            window.addEventListener('touchend', end);
        }

        document.getElementById('sizeRange').oninput = e => updateSize(parseInt(e.target.value));
        init();
        function closePreview() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
